# MariaDB Galera cluster via mariadb-operator
# 3 nodes pinned to k3-node1, k3-node2, k3-node3
# local-path storage (Galera handles replication at DB layer)
# seaweedfs database + user pre-created for SeaweedFS filer
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-root
  namespace: mariadb
type: Opaque
stringData:
  password: "<CHANGE_ME: strong random password for MariaDB root>"
---
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-seaweedfs
  namespace: mariadb
type: Opaque
stringData:
  password: "<CHANGE_ME: strong random password for seaweedfs DB user — must match proxysql.yaml and seaweedfs-values.yaml>"
---
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-metrics-monitoring
  namespace: mariadb
type: Opaque
stringData:
  password: "<CHANGE_ME: strong random password for MariaDB metrics/monitoring user>"
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: mariadb-galera
  namespace: mariadb
spec:
  image: mariadb:11.4

  rootPasswordSecretKeyRef:
    name: mariadb-root
    key: password

  # Galera HA
  galera:
    enabled: true
    config:
      reuseStorageVolume: true

  replicas: 3

  # Pin to nodes 1-3
  nodeSelector:
    mariadb-galera: "true"

  # One pod per node
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/instance
                operator: In
                values:
                  - mariadb-galera
          topologyKey: kubernetes.io/hostname

  # Run as mysql user (uid/gid 999) so hostPath volumes are writable
  podSecurityContext:
    fsGroup: 999

  # local-path storage per node
  storage:
    size: 20Gi
    storageClassName: local-path

  # ClusterIP service accessible to all pods
  service:
    type: ClusterIP

  # Pre-create the seaweedfs database
  database: seaweedfs

  # Pre-create the seaweedfs user
  username: seaweedfs
  passwordSecretKeyRef:
    name: mariadb-seaweedfs
    key: password

  # Prometheus metrics via mysqld_exporter sidecar
  metrics:
    enabled: true
    username: monitoring
    passwordSecretKeyRef:
      name: mariadb-metrics-monitoring
      key: password
    serviceMonitor:
      interval: 30s
      scrapeTimeout: 20s
      prometheusRelease: monitoring

  # Grant seaweedfs user full access to seaweedfs db
  myCnf: |
    [mysqld]
    max_connections=300
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci
    innodb_buffer_pool_size=512M
