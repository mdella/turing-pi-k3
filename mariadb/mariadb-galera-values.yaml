replicaCount: 3

# Passwords
rootUser:
  password: "<CHANGE_ME: strong random password for MariaDB root>"

db:
  user: seaweedfs
  password: "<CHANGE_ME: strong random password for seaweedfs DB user>"
  name: seaweedfs

galera:
  mariabackup:
    password: "<CHANGE_ME: strong random password for Galera mariabackup SST user>"

# Galera replication password
mariadbConfiguration: |-
  [mysqld]
  skip-name-resolve
  explicit_defaults_for_timestamp
  basedir=/opt/bitnami/mariadb
  datadir=/bitnami/mariadb/data
  plugin_dir=/opt/bitnami/mariadb/lib/plugin
  port=3306
  bind-address=*
  character-set-server=UTF8
  collation-server=utf8_general_ci
  max_connections=300
  open_files_limit=65535
  innodb_buffer_pool_size=512M
  [client]
  port=3306
  socket=/opt/bitnami/mariadb/tmp/mysql.sock
  plugin_dir=/opt/bitnami/mariadb/lib/plugin
  [manager]
  port=3306
  socket=/opt/bitnami/mariadb/tmp/mysql.sock
  pid-file=/opt/bitnami/mariadb/tmp/mysqld.pid

# Restrict to nodes 1-3 (control-plane)
nodeSelector:
  mariadb-galera: "true"

# One pod per node
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - mariadb-galera
        topologyKey: kubernetes.io/hostname

# Persistent storage via Longhorn
persistence:
  enabled: true
  storageClass: local-path
  size: 20Gi

# ClusterIP service — accessible to all pods in the cluster
service:
  type: ClusterIP
  port: 3306

# Metrics for Prometheus
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: mariadb
