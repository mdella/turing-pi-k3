---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secret
  namespace: ai-services
type: Opaque
stringData:
  # Change this before applying — used as the Bearer token for API access
  LITELLM_MASTER_KEY: "sk-changeme-replace-this"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai-services
data:
  config.yaml: |
    model_list:
      - model_name: qwen2.5-coder:3b
        litellm_params:
          model: ollama/qwen2.5-coder:3b
          api_base: http://ollama.ai-services.svc.cluster.local:11434

      # Uncomment once qwen2.5-coder:7b is pulled via a separate Job
      # - model_name: qwen2.5-coder:7b
      #   litellm_params:
      #     model: ollama/qwen2.5-coder:7b
      #     api_base: http://ollama.ai-services.svc.cluster.local:11434

      # NPU-accelerated backend via RKLLaMA — Qwen2.5-3B W8A8
      - model_name: qwen2.5-coder:3b-npu
        litellm_params:
          model: ollama/Qwen2.5-3B-Coder-Instruct
          api_base: http://rkllama.ai-services.svc.cluster.local:8080
          timeout: 600

      # NPU-accelerated backend via RKLLaMA — DeepSeek-Coder-1.3B W8A8
      - model_name: deepseek-coder:1.3b-npu
        litellm_params:
          model: ollama/deepseek-coder-1.3b
          api_base: http://rkllama.ai-services.svc.cluster.local:8080
          timeout: 300

    litellm_settings:
      drop_params: true
      # Generous timeout for CPU models; NPU model has its own 600s per-model timeout
      request_timeout: 120

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      # Prefer any control-plane node so Ollama gets undivided node4 RAM
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - k3-node4
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          args:
            - --config
            - /app/config.yaml
            - --port
            - "4000"
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: LITELLM_MASTER_KEY
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1536Mi"
              cpu: "500m"
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: ai-services
spec:
  selector:
    app: litellm
  ports:
    - name: http
      port: 4000
      targetPort: 4000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litellm
  namespace: ai-services
  annotations:
    # Long timeouts required — Rockchip inference on multi-file prompts can be slow
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Uncomment for TLS once DNS + NAT are set up:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: ai.geekstyle.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm
                port:
                  number: 4000
  # tls:
  #   - hosts:
  #       - ai.geekstyle.net
  #     secretName: ai-tls
