# ProxySQL Prometheus exporter — custom Python, ARM64-compatible
# Uses python:3.12-alpine + pymysql to scrape ProxySQL admin stats
# Apply: kubectl apply -f proxysql-exporter.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: proxysql-exporter-script
  namespace: mariadb
data:
  exporter.py: |
    #!/usr/bin/env python3
    import os, pymysql
    from http.server import HTTPServer, BaseHTTPRequestHandler

    HOST     = os.environ['PROXYSQL_HOST']
    PORT     = int(os.environ.get('PROXYSQL_PORT', '6032'))
    USER     = os.environ['PROXYSQL_USER']
    PASSWORD = os.environ['PROXYSQL_PASSWORD']

    POOL_METRICS = [
        ('proxysql_connection_pool_conn_used',       'gauge',   'ConnUsed',         'Connections currently in use'),
        ('proxysql_connection_pool_conn_free',       'gauge',   'ConnFree',         'Free connections in pool'),
        ('proxysql_connection_pool_conn_ok',         'counter', 'ConnOK',           'Successful connections total'),
        ('proxysql_connection_pool_conn_err',        'counter', 'ConnERR',          'Failed connections total'),
        ('proxysql_connection_pool_queries',         'counter', 'Queries',          'Queries routed total'),
        ('proxysql_connection_pool_bytes_data_sent', 'counter', 'Bytes_data_sent',  'Bytes sent to backends'),
        ('proxysql_connection_pool_bytes_data_recv', 'counter', 'Bytes_data_recv',  'Bytes received from backends'),
        ('proxysql_connection_pool_latency_us',      'gauge',   'Latency_us',       'Average backend latency microseconds'),
    ]

    def get_metrics():
        conn = pymysql.connect(host=HOST, port=PORT, user=USER, password=PASSWORD,
                               ssl_disabled=True, connect_timeout=5)
        lines = []
        try:
            with conn.cursor(pymysql.cursors.DictCursor) as cur:
                cur.execute("SELECT * FROM stats.stats_mysql_connection_pool")
                rows = cur.fetchall()
            for name, typ, col, help_text in POOL_METRICS:
                lines.append(f'# HELP {name} {help_text}')
                lines.append(f'# TYPE {name} {typ}')
                for r in rows:
                    labels = f'hostgroup="{r["hostgroup"]}",srv_host="{r["srv_host"]}",srv_port="{r["srv_port"]}"'
                    lines.append(f'{name}{{{labels}}} {r[col]}')
        finally:
            conn.close()
        return '\n'.join(lines) + '\n'

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path != '/metrics':
                self.send_response(404); self.end_headers(); return
            try:
                body = get_metrics().encode()
                self.send_response(200)
                self.send_header('Content-Type', 'text/plain; version=0.0.4')
                self.send_header('Content-Length', str(len(body)))
                self.end_headers()
                self.wfile.write(body)
            except Exception as e:
                self.send_response(500); self.end_headers()
                self.wfile.write(str(e).encode())
        def log_message(self, *a): pass

    if __name__ == '__main__':
        print(f'proxysql-exporter listening on :42004')
        HTTPServer(('0.0.0.0', 42004), Handler).serve_forever()
---
apiVersion: v1
kind: Secret
metadata:
  name: proxysql-exporter-secret
  namespace: mariadb
stringData:
  # CHANGE_ME: must match the radmin password in proxysql.yaml admin_credentials
  password: "<CHANGE_ME: ProxySQL radmin password>"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxysql-exporter
  namespace: mariadb
  labels:
    app: proxysql-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proxysql-exporter
  template:
    metadata:
      labels:
        app: proxysql-exporter
    spec:
      initContainers:
        - name: install-deps
          image: python:3.12-alpine
          command: [pip, install, --target=/deps, pymysql, -q]
          volumeMounts:
            - name: deps
              mountPath: /deps
      containers:
        - name: exporter
          image: python:3.12-alpine
          command: [python, /scripts/exporter.py]
          ports:
            - name: metrics
              containerPort: 42004
          env:
            - name: PYTHONPATH
              value: "/deps"
            - name: PROXYSQL_HOST
              value: "proxysql-admin.mariadb.svc.cluster.local"
            - name: PROXYSQL_PORT
              value: "6032"
            - name: PROXYSQL_USER
              value: "radmin"
            - name: PROXYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: proxysql-exporter-secret
                  key: password
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: deps
              mountPath: /deps
          resources:
            requests:
              cpu: 50m
              memory: 48Mi
            limits:
              cpu: 200m
              memory: 96Mi
      volumes:
        - name: script
          configMap:
            name: proxysql-exporter-script
        - name: deps
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: proxysql-exporter
  namespace: mariadb
  labels:
    app: proxysql-exporter
spec:
  selector:
    app: proxysql-exporter
  ports:
    - name: metrics
      port: 42004
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: proxysql-exporter
  namespace: mariadb
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: proxysql-exporter
  namespaceSelector:
    matchNames:
      - mariadb
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 20s
