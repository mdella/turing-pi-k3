# SeaweedFS Prometheus ServiceMonitors
# All three components expose metrics on port 9327
# Apply: kubectl apply -f seaweedfs-servicemonitors.yaml
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: seaweedfs-master
  namespace: seaweedfs
  labels:
    release: monitoring
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/component: master
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: master
      app.kubernetes.io/name: seaweedfs
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 20s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: seaweedfs-filer
  namespace: seaweedfs
  labels:
    release: monitoring
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/component: filer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: filer
      app.kubernetes.io/name: seaweedfs
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 20s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: seaweedfs-volume
  namespace: seaweedfs
  labels:
    release: monitoring
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/component: volume
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: volume
      app.kubernetes.io/name: seaweedfs
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 20s
